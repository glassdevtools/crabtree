name: Build macOS Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-macos-installer:
    name: Build macOS installer
    runs-on: macos-14
    env:
      CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
      CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_API_KEY_ID_FROM_SECRET: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
      MOLTTREE_UPDATE_BASE_URL: ${{ vars.MOLTTREE_UPDATE_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare App Store Connect key
        id: signing
        shell: bash
        run: |
          if [[ -n "$APPLE_API_KEY_ID_FROM_SECRET" && -n "$APPLE_API_KEY_P8_BASE64" ]]; then
            API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID_FROM_SECRET}.p8"
            printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 -D > "$API_KEY_PATH"
            chmod 600 "$API_KEY_PATH"
            echo "APPLE_API_KEY=$API_KEY_PATH" >> "$GITHUB_ENV"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID_FROM_SECRET" >> "$GITHUB_ENV"
          fi

          if [[ -n "$CSC_LINK" && -n "$CSC_KEY_PASSWORD" && -n "$APPLE_API_KEY_ID_FROM_SECRET" && -n "$APPLE_API_ISSUER" && -n "$APPLE_API_KEY_P8_BASE64" ]]; then
            echo "mode=signed" >> "$GITHUB_OUTPUT"
          else
            echo "mode=unsigned" >> "$GITHUB_OUTPUT"
          fi

      - name: Build signed installer
        if: steps.signing.outputs.mode == 'signed'
        run: npm run dist:mac -- --publish never

      - name: Build unsigned installer
        if: steps.signing.outputs.mode == 'unsigned'
        run: npm run dist:mac -- --publish never -c.mac.identity=null -c.mac.notarize=false

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: molttree-macos-${{ runner.arch }}
          path: |
            dist/MoltTree-*.dmg
            dist/MoltTree-*.zip
            dist/*.blockmap
            dist/latest-mac.yml
          if-no-files-found: error
          retention-days: 14
