name: Build macOS Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-macos-installer:
    name: Build macOS installer
    runs-on: macos-14
    env:
      CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
      CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_API_KEY_ID_FROM_SECRET: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Read package release status
        id: release
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./desktop-app/package.json').version")"
          RELEASE_TAG="v${PACKAGE_VERSION}"

          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "should_create_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_publish=true" >> "$GITHUB_OUTPUT"

          TAG_SHA="$(git ls-remote --tags origin "refs/tags/${RELEASE_TAG}^{}" | awk '{print $1}' | head -n 1)"
          if [[ -z "$TAG_SHA" ]]; then
            TAG_SHA="$(git ls-remote --tags origin "refs/tags/${RELEASE_TAG}" | awk '{print $1}' | head -n 1)"
          fi

          if [[ -z "$TAG_SHA" ]]; then
            echo "should_create_tag=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_create_tag=false" >> "$GITHUB_OUTPUT"

          if [[ "$TAG_SHA" != "$GITHUB_SHA" ]]; then
            echo "$RELEASE_TAG already exists at $TAG_SHA, but this build is $GITHUB_SHA." >&2
            echo "Bump desktop-app/package.json before publishing a new release." >&2
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Prepare App Store Connect key
        id: signing
        shell: bash
        run: |
          is_api_key_ready=false
          is_apple_id_ready=false

          if [[ -n "$APPLE_API_KEY_ID_FROM_SECRET" && -n "$APPLE_API_KEY_P8_BASE64" ]]; then
            API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID_FROM_SECRET}.p8"
            printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 -D > "$API_KEY_PATH"
            chmod 600 "$API_KEY_PATH"
            echo "APPLE_API_KEY=$API_KEY_PATH" >> "$GITHUB_ENV"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID_FROM_SECRET" >> "$GITHUB_ENV"
          fi

          if [[ -n "$APPLE_API_KEY_ID_FROM_SECRET" && -n "$APPLE_API_ISSUER" && -n "$APPLE_API_KEY_P8_BASE64" ]]; then
            is_api_key_ready=true
          fi

          if [[ -n "$APPLE_ID" && -n "$APPLE_APP_SPECIFIC_PASSWORD" && -n "$APPLE_TEAM_ID" ]]; then
            is_apple_id_ready=true
          fi

          if [[ -n "$CSC_LINK" && -n "$CSC_KEY_PASSWORD" && ("$is_api_key_ready" == "true" || "$is_apple_id_ready" == "true") ]]; then
            echo "mode=signed" >> "$GITHUB_OUTPUT"
          else
            echo "mode=unsigned" >> "$GITHUB_OUTPUT"
          fi

      - name: Require signing for release
        if: steps.release.outputs.should_publish == 'true' && steps.signing.outputs.mode != 'signed'
        shell: bash
        run: |
          echo "Publishing a release requires APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, and notarization credentials." >&2
          echo "Use either APPLE_API_KEY + APPLE_API_ISSUER + APPLE_API_KEY_P8_BASE64, or APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID." >&2
          exit 1

      - name: Create release tag
        if: steps.release.outputs.should_publish == 'true' && steps.release.outputs.should_create_tag == 'true' && steps.signing.outputs.mode == 'signed'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/${RELEASE_TAG}"
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}

      - name: Build and publish signed release
        if: steps.release.outputs.should_publish == 'true' && steps.signing.outputs.mode == 'signed'
        run: npm run dist:mac --workspace desktop-app -- --publish always
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish static download aliases
        if: steps.release.outputs.should_publish == 'true' && steps.signing.outputs.mode == 'signed'
        shell: bash
        run: |
          shopt -s nullglob

          static_assets=()
          for arch in arm64 x64; do
            for dmg_path in desktop-app/dist/MoltTree-*-"${arch}".dmg; do
              static_asset_path="desktop-app/dist/MoltTree_${arch}.dmg"
              cp "$dmg_path" "$static_asset_path"
              static_assets+=("$static_asset_path")
              break
            done
          done

          if [[ ${#static_assets[@]} -eq 0 ]]; then
            echo "No static download aliases were created."
            exit 0
          fi

          gh release upload "$RELEASE_TAG" "${static_assets[@]}" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}

      - name: Build signed installer
        if: steps.release.outputs.should_publish != 'true' && steps.signing.outputs.mode == 'signed'
        run: npm run dist:mac --workspace desktop-app -- --publish never

      - name: Build unsigned installer
        if: steps.release.outputs.should_publish != 'true' && steps.signing.outputs.mode == 'unsigned'
        run: npm run dist:mac --workspace desktop-app -- --publish never -c.mac.identity=null -c.mac.notarize=false

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: molttree-macos-${{ runner.arch }}
          path: |
            desktop-app/dist/MoltTree-*.dmg
            desktop-app/dist/MoltTree-*.zip
            desktop-app/dist/*.blockmap
            desktop-app/dist/latest*.yml
          if-no-files-found: error
          retention-days: 14
