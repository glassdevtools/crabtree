name: Build Desktop Installers

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  read-package-release-status:
    name: Read package release status
    runs-on: ubuntu-latest
    outputs:
      package_version: ${{ steps.release.outputs.package_version }}
      should_create_tag: ${{ steps.release.outputs.should_create_tag }}
      should_publish: ${{ steps.release.outputs.should_publish }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Read package release status
        id: release
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./desktop-app/package.json').version")"
          RELEASE_TAG="v${PACKAGE_VERSION}"

          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "should_create_tag=false" >> "$GITHUB_OUTPUT"
            echo "Release $RELEASE_TAG already exists, so installer builds were skipped." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          TAG_SHA="$(git ls-remote --tags origin "refs/tags/${RELEASE_TAG}^{}" | awk '{print $1}' | head -n 1)"
          if [[ -z "$TAG_SHA" ]]; then
            TAG_SHA="$(git ls-remote --tags origin "refs/tags/${RELEASE_TAG}" | awk '{print $1}' | head -n 1)"
          fi

          if [[ -z "$TAG_SHA" ]]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "should_create_tag=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_create_tag=false" >> "$GITHUB_OUTPUT"

          if [[ "$TAG_SHA" != "$GITHUB_SHA" ]]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "$RELEASE_TAG already exists at $TAG_SHA, but this build is $GITHUB_SHA." >> "$GITHUB_STEP_SUMMARY"
            echo "Bump desktop-app/package.json before publishing a new release." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "should_publish=true" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

  build-macos-installer:
    name: Build macOS installer
    needs: read-package-release-status
    if: needs.read-package-release-status.outputs.should_publish == 'true'
    runs-on: macos-26
    env:
      CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
      CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_API_KEY_ID_FROM_SECRET: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare App Store Connect key
        id: signing
        shell: bash
        run: |
          is_api_key_ready=false
          is_apple_id_ready=false

          if [[ -n "$APPLE_API_KEY_ID_FROM_SECRET" && -n "$APPLE_API_KEY_P8_BASE64" ]]; then
            API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID_FROM_SECRET}.p8"
            printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 -D > "$API_KEY_PATH"
            chmod 600 "$API_KEY_PATH"
            echo "APPLE_API_KEY=$API_KEY_PATH" >> "$GITHUB_ENV"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID_FROM_SECRET" >> "$GITHUB_ENV"
          fi

          if [[ -n "$APPLE_API_KEY_ID_FROM_SECRET" && -n "$APPLE_API_ISSUER" && -n "$APPLE_API_KEY_P8_BASE64" ]]; then
            is_api_key_ready=true
          fi

          if [[ -n "$APPLE_ID" && -n "$APPLE_APP_SPECIFIC_PASSWORD" && -n "$APPLE_TEAM_ID" ]]; then
            is_apple_id_ready=true
          fi

          if [[ -n "$CSC_LINK" && -n "$CSC_KEY_PASSWORD" && ("$is_api_key_ready" == "true" || "$is_apple_id_ready" == "true") ]]; then
            echo "mode=signed" >> "$GITHUB_OUTPUT"
          else
            echo "mode=unsigned" >> "$GITHUB_OUTPUT"
          fi

      - name: Require signing for release
        if: steps.signing.outputs.mode != 'signed'
        shell: bash
        run: |
          echo "Publishing a release requires APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, and notarization credentials." >&2
          echo "Use either APPLE_API_KEY + APPLE_API_ISSUER + APPLE_API_KEY_P8_BASE64, or APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID." >&2
          exit 1

      - name: Build signed macOS installer
        run: npm run dist:mac --workspace desktop-app -- --publish never

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: molttree-macos-universal
          path: |
            desktop-app/dist/MoltTree-*.dmg
            desktop-app/dist/MoltTree-*.zip
            desktop-app/dist/*.blockmap
            desktop-app/dist/latest*.yml
          if-no-files-found: error
          retention-days: 14

  build-windows-installer:
    name: Build Windows installer
    needs: read-package-release-status
    if: ${{ false }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run dist:win --workspace desktop-app -- --publish never

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: molttree-windows-x64
          path: |
            desktop-app/dist/MoltTree-*.exe
            desktop-app/dist/MoltTree-*.exe.blockmap
            desktop-app/dist/latest*.yml
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish release
    needs:
      - read-package-release-status
      - build-macos-installer
    if: needs.read-package-release-status.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create release tag
        if: needs.read-package-release-status.outputs.should_create_tag == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/${RELEASE_TAG}"
        env:
          RELEASE_TAG: ${{ needs.read-package-release-status.outputs.tag }}

      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release assets
        shell: bash
        run: |
          shopt -s globstar nullglob

          release_assets=()
          for asset_path in \
            release-artifacts/**/MoltTree-*.dmg \
            release-artifacts/**/MoltTree-*.zip \
            release-artifacts/**/*.blockmap \
            release-artifacts/**/latest*.yml
          do
            release_assets+=("$asset_path")
          done

          for dmg_path in release-artifacts/**/MoltTree-*-universal.dmg; do
            static_asset_path="release-artifacts/MoltTree.dmg"
            cp "$dmg_path" "$static_asset_path"
            release_assets+=("$static_asset_path")
            break
          done

          if [[ ${#release_assets[@]} -eq 0 ]]; then
            echo "No release assets were found." >&2
            exit 1
          fi

          release_notes_path="$RUNNER_TEMP/release-notes.md"
          cat > "$release_notes_path" <<EOF
          MoltTree ${PACKAGE_VERSION}.

          Website: [MoltTree](https://molttree.app)

          | OS | Download |
          | --- | --- |
          | Mac | [Download for Mac](https://github.com/glassdevtools/molttree/releases/download/${RELEASE_TAG}/MoltTree.dmg) |
          | Windows | Coming soon... |
          | Linux | Coming soon... |
          EOF

          gh release create "$RELEASE_TAG" "${release_assets[@]}" \
            --verify-tag \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TAG" \
            --notes-file "$release_notes_path"
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_VERSION: ${{ needs.read-package-release-status.outputs.package_version }}
          RELEASE_TAG: ${{ needs.read-package-release-status.outputs.tag }}
