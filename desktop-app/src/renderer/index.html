<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crabtree</title>
    <style>
      html,
      body,
      #initial-loading-root,
      #root {
        background: #f4f6f8;
      }

      body {
        margin: 0;
      }

      .initial-loading-screen {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f6f8;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .initial-loading-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
      }

      .initial-loading-image {
        width: min(42vmin, 300px);
        aspect-ratio: 1 / 1;
        max-width: calc(100vw - 48px);
        max-height: calc(100vh - 120px);
        background-image: var(--initial-loading-image-url);
        background-repeat: no-repeat;
        background-position: center;
        background-size: contain;
        pointer-events: none;
        user-select: none;
        -webkit-user-drag: none;
      }

      .initial-loading-status {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        color: #5f6670;
        font-size: 12px;
        font-weight: 650;
      }

      .initial-loading-spinner {
        width: 16px;
        height: 16px;
        border: 2px solid #c6ccd4;
        border-top-color: #68717d;
        border-radius: 999px;
        animation: initial-loading-spin 900ms linear infinite;
      }

      @keyframes initial-loading-spin {
        from {
          transform: rotate(0deg);
        }

        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <link
      rel="preload"
      as="image"
      href="./assets/loading-1.png"
      data-initial-loading-image
    />
    <link
      rel="preload"
      as="image"
      href="./assets/loading-2.png"
      data-initial-loading-image
    />
    <link
      rel="preload"
      as="image"
      href="./assets/loading-3.png"
      data-initial-loading-image
    />
    <script>
      {
        const initialLoadingImageUrls = Array.from(
          document.querySelectorAll("[data-initial-loading-image]"),
          (initialLoadingImageLink) => initialLoadingImageLink.href,
        );
        const initialLoadingImageIndex = Math.floor(
          Math.random() * initialLoadingImageUrls.length,
        );
        document.documentElement.style.setProperty(
          "--initial-loading-image-url",
          `url("${initialLoadingImageUrls[initialLoadingImageIndex]}")`,
        );
      }
    </script>
  </head>
  <body>
    <div id="initial-loading-root">
      <main class="initial-loading-screen">
        <div class="initial-loading-content">
          <div class="initial-loading-image" aria-hidden="true"></div>
          <div class="initial-loading-status">
            <span class="initial-loading-spinner" aria-hidden="true"></span>
            <span>Loading repositories...</span>
          </div>
        </div>
      </main>
    </div>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
